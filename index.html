<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>工作风格与协作习惯问卷 | 专业评估系统</title>
    <!-- 引入 Element Plus 样式 & 字体 -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css" />
    <!-- 引入 Vue 3 和 Element Plus JS -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <!-- 引入 axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f6;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 32px 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .survey-card {
            border-radius: 28px;
            background: #ffffff;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s;
        }

        .survey-header {
            background: linear-gradient(135deg, #1e3c4c 0%, #132b38 100%);
            padding: 32px 36px;
            color: white;
        }

        .survey-header h1 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.3px;
            margin-bottom: 12px;
        }

        .survey-header p {
            opacity: 0.85;
            font-size: 1rem;
            line-height: 1.4;
        }

        .instruction {
            background: #eef2fa;
            padding: 14px 28px;
            font-size: 0.9rem;
            color: #1f3b4a;
            border-bottom: 1px solid #e0e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .name-input-area {
            background: #ffffff;
            padding: 20px 0px;
            border-bottom: 1px solid #e9edf2;
            display: flex; 
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .name-label {
            font-weight: 600;
            color: #2c6282;
            font-size: 0.95rem;
        }

        .progress-indicator {
            font-weight: 500;
            background: #d9e2ef;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .questions-area {
            padding: 32px 36px 24px;
            max-height: 55vh;
            overflow-y: auto;
        }

        .question-item {
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eef2f8;
            transition: all 0.1s;
        }

        .question-text {
            font-weight: 600;
            font-size: 1rem;
            color: #1f2f3a;
            margin-bottom: 14px;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .q-num {
            background: #e9eff6;
            border-radius: 30px;
            padding: 2px 12px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #2c6282;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-left: 8px;
        }
        .radio-group .el-radio {
            flex: 1 1;
            min-width: 80px;
            background-color: #1e3c4c;
        }

        .footer-bar {
            background: #fafcff;
            padding: 20px 6px 32px;
            border-top: 1px solid #e9edf2;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        @media (max-width: 700px) {
            .questions-area {
                padding: 20px;
            }
            .radio-group {
                gap: 6px 12px;
            }
            .survey-header h1 {
                font-size: 1.5rem;
            }
        }
        
        /* 滚动条美化 */
        .questions-area::-webkit-scrollbar {
            width: 6px;
        }
        .questions-area::-webkit-scrollbar-track {
            background: #eef2f9;
            border-radius: 10px;
        }
        .questions-area::-webkit-scrollbar-thumb {
            background: #b9cadb;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="app-container">
        <div class="survey-card">
            <div class="survey-header">
                <h1>📋 工作风格与协作习惯问卷</h1>
                <p>根据您较稳定的状态作答 · 无对错之分 · 真实即可获得精准分析</p>
            </div>
            <div class="instruction">
                <span>✅ 请根据真实感受选择最符合的选项</span>
                <span class="progress-indicator">已完成: {{ answeredCount }} / {{ totalQuestions }}</span>
            </div>
            
            <div class="questions-area">
                <div class="name-input-area">
                    <span class="name-label">👤 您的姓名：</span>
                    <el-input 
                        v-model="userName" 
                        placeholder="请输入您的姓名" 
                        clearable 
                        style="width: 280px"
                        size="large"
                    ></el-input>
                    <span style="font-size: 12px; color: #8a9cb0;">* 请填写真实姓名</span>
                </div> 
                <el-form label-position="top">
                    <div v-for="(question, idx) in questions" :key="idx" class="question-item">
                        <div class="question-text">
                            <span class="q-num">{{ idx+1 }}</span>
                            <span>{{ question.text }}</span>
                        </div>
                        <el-radio-group v-model="formAnswers[idx]" size="default" class="radio-group">
                            <el-radio :label="1">A 非常不符合</el-radio>
                            <el-radio :label="2">B 比较不符合</el-radio>
                            <el-radio :label="3">C 略不符合</el-radio>
                            <el-radio :label="4">D 一般</el-radio>
                            <el-radio :label="5">E 略符合</el-radio>
                            <el-radio :label="6">F 比较符合</el-radio>
                            <el-radio :label="7">G 非常符合</el-radio>
                        </el-radio-group>
                    </div>
                </el-form>
            </div>
            <div class="footer-bar">
                <el-button type="info" plain @click="resetAnswers" size="large">🗑️ 重置所有选项</el-button>
                <el-button type="primary" @click="handleSubmit" size="large" :disabled="!isAllAnswered || !userNameValid" :loading="submitting">
                    📊 提交测评
                </el-button>
            </div>
        </div>
    </div>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            // ---------- 25道题目 (基于原始问卷)
            const questions = [
                { text: "我习惯在已有基础上逐步推进，而不是频繁改变做法。" },
                { text: "一件事一旦开始进入状态，我通常会尽量把它做完整。" },
                { text: "我通常会把前期已经投入的时间和精力纳入后续判断。" },
                { text: "比起不断开启新的尝试，我更愿意把手头的事情做深。" },
                { text: "即使刚熟悉一种节奏，我也不介意很快切换到另一套方式。" },
                { text: "我认为很多成果都需要持续投入一段时间后才会显现。" },
                { text: "我认为人与人之间是否配合顺畅，通常不需要太多时间磨合。" },
                { text: "一旦与团队形成默契，我会比较珍惜这种状态。" },
                { text: "比起熟悉的协作关系，我更愿意尝试新的合作组合。" },
                { text: "我觉得顺畅的合作环境本身就是一种重要资源。" },
                { text: "我会认真看待已经形成的信任和理解。" },
                { text: "我并不介意反复从头建立新的合作方式。" },
                { text: "我做选择时，会考虑转换过程中的隐性成本。" },
                { text: "一旦出现看起来不错的新选项，我通常会认真考虑马上调整原有安排。" },
                { text: "即使当前方向还算合理，我也会经常比较其他可能性。" },
                { text: "我对“先沉下来，再看结果”这件事是有耐心的。" },
                { text: "我认为很多判断，只有经过一段时间才会更准确。" },
                { text: "一旦确认某件事值得投入，我通常愿意给它足够时间。" },
                { text: "比起连续性，我更看重随时根据情况改变做法。" },
                { text: "如果有新的想法，我通常不介意重新来过。" },
                { text: "我通常能在熟悉的环境里发挥出更稳定的水平。" },
                { text: "对我来说，新鲜感有时比熟悉感更能带来效率。" },
                { text: "即使一套方式运行顺畅，我也愿意尝试新的做法。" },
                { text: "我会珍惜已经建立起来的做事节奏。" },
                { text: "我觉得很多价值来自持续积累，而不只是即时变化。" }
            ];
            const totalQuestions = questions.length;
            
            // 答案存储 1-7分
            const formAnswers = ref(Array(totalQuestions).fill(null));
            const submitting = ref(false);
            // 用户姓名
            const userName = ref("");
            
            // 姓名校验
            const userNameValid = computed(() => {
                return userName.value && userName.value.trim().length > 0;
            });
            
            // 已作答数量
            const answeredCount = computed(() => {
                return formAnswers.value.filter(v => v !== null && v >= 1 && v <= 7).length;
            });
            
            const isAllAnswered = computed(() => {
                return answeredCount.value === totalQuestions;
            });
            
            // 重置
            const resetAnswers = (closeTip) => {
                console.log('重置所有选项:',closeTip);
                //true表示重置时不提示，false或undefined表示重置后提示
                formAnswers.value = Array(totalQuestions).fill(null);
                if (!closeTip) {
                    ElementPlus.ElMessage.info('已清空所有选项，可以重新测评');
                }
            };
            
            // 计算总分 (基于25题)
            const computeTotalScore = () => {
                const answers = [...formAnswers.value];
                let total = 0;
                for (let i = 0; i < answers.length; i++) {
                    total += answers[i];
                }
                return total;
            };
            
            // 提交测评：计算总分，将分数和姓名通过GET请求提交到后端
            const handleSubmit = async () => {
                if (!isAllAnswered.value) {
                    ElementPlus.ElMessage.warning('请完成全部25道题目后再提交');
                    return;
                }
                if (!userNameValid.value) {
                    ElementPlus.ElMessage.warning('请填写您的姓名');
                    return;
                }
                
                const totalScore = computeTotalScore();
                const nameValue = userName.value.trim();
                const apiUrl = 'http://192.168.3.10:20012/appraisal/insertClerk';
                
                submitting.value = true;
                try {
                    // 使用 GET 请求，参数为 score 和 name
                    const response = await axios.get(apiUrl, {
                        params: {
                            score: totalScore,
                            name: nameValue
                        },
                        timeout: 10000
                    });
                    
                    // 根据后端返回格式处理: { "status": 0, "message": "", "data": true }
                    if (response.data && response.data.status === 200) {
                        ElementPlus.ElMessage.success({
                            message: `提交成功！您的作答已经完成，感谢参与！`,
                            duration: 3000
                        });
                        // 可选：提交成功后重置表单或跳转，这里仅清空姓名和选项（让用户可重新测评或保持）
                        // 根据需求不清空，只提示成功，但为了体验可询问是否重置？但简单处理：保留数据并提示成功即可
                        // 也可让用户手动重置
                       resetAnswers(true); // 重置选项但不提示
                    } else {
                        // 后端返回非0状态码
                        const errMsg = response.data?.message || '提交失败，请稍后重试';
                        ElementPlus.ElMessage.error(errMsg);
                    }
                } catch (error) {
                    console.error('提交测评失败:', error);
                    let errorMsg = '网络错误，无法连接到服务器';
                    if (error.response) {
                        errorMsg = `服务器响应错误: ${error.response.status}`;
                    } else if (error.request) {
                        errorMsg = '服务器无响应，请检查网络或联系管理员';
                    }
                    ElementPlus.ElMessage.error(errorMsg);
                } finally {
                    submitting.value = false;
                }
            };
            
            return {
                questions,
                totalQuestions,
                formAnswers,
                userName,
                userNameValid,
                answeredCount,
                isAllAnswered,
                submitting,
                resetAnswers,
                handleSubmit,
                computeTotalScore
            };
        }
    }).use(ElementPlus).mount('#app');
</script>
</body>
</html>
